name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 15m
          script: |
            cd /var/www/ha-agriculture
            git pull origin main
            cd client && npm run build
            cd ../server && pm2 restart ha-agriculture
            echo "✅ Deploy completed!"

      - name: Wait before retry
        if: steps.deploy1.outcome == 'failure'
        run: sleep 30

      - name: Deploy to VPS (attempt 2)
        if: steps.deploy1.outcome == 'failure'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 15m
          script: |
            cd /var/www/ha-agriculture
            git pull origin main
            cd client && npm run build
            cd ../server && pm2 restart ha-agriculture
            echo "✅ Deploy completed (retry)!"